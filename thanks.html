<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>감사합니다 — 유인상 ♥ 이겨레</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8f5f0;
      background-image: radial-gradient(ellipse at top, #f0e8dc 0%, #f8f5f0 60%);
      font-family: 'Noto Serif KR', serif;
      color: #2a211a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: #fff;
      max-width: 400px;
      width: 100%;
      text-align: center;
      padding: 72px 48px;
      box-shadow: 0 2px 60px rgba(80,50,20,.10);
    }

    .icon { font-size: 40px; margin-bottom: 28px; }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .desc {
      font-size: 14px;
      line-height: 1.9;
      color: #7a6a60;
    }

    .line {
      width: 40px;
      height: 1px;
      background: #b89b7a;
      margin: 28px auto;
    }

    .date-note {
      font-size: 12px;
      letter-spacing: 1px;
      color: #b89b7a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🥂</div>
    <h1 class="title">감사합니다</h1>
    <p class="desc">소중한 응답 감사드려요.<br>7월 10일에 함께해요!</p>
    <div class="line"></div>
    <p class="date-note">2026 · 07 · 10 · 오후 6시 · 역삼 샹볼뮈지니</p>
  </div>
</body>
</html>
